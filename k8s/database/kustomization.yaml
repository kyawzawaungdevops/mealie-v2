
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: database
resources:
  - namespace.yaml
labels:
  - pairs:
      app: mealie
helmCharts:
  - name: postgresql
    repo: https://cetic.github.io/helm-charts
    version: 0.2.1
    releaseName: mealie-db
    namespace: database
    valuesFile: values-postgres.yaml

